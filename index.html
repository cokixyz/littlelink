<!DOCTYPE html>
<html class="theme-auto" lang="en"> 
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>ROCKBROS Clothing - Official Links</title>
    <link rel="icon" type="image/x-icon" href="images/avatar.png"> 

    <meta name="description" content="Discover premium cycling apparel with ROCKBROS Clothing. Shop high-quality cycling jerseys, shorts, and bibs.">

    <meta name="keywords" content="ROCKBROS Clothing, cycling apparel, cycling jersey, cycling shorts, riding gear">

    <link rel="canonical" href="https://rockbrosclothing.com">

    <meta name="author" content="ROCKBROS Clothing">

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

    <style>
      .button.button-default {
        background-color: #17A05E !important; /* RockBros Green */
        color: white !important; 
        border: none !important; 
      }
      /* 按钮悬停变深 */
      .button.button-default:hover {
        background-color: #138750 !important;
      }
      /* 调整简介段落的行高 */
      p.bio {
        line-height: 1.6;
        margin-bottom: 30px;
      }

      /* --- 仅保留静态的绿色边框和发光效果 --- */
      .avatar {
        border: 4px solid #17A05E !important; /* 官方绿基础边框 */
        box-shadow: 0 0 20px rgba(23, 160, 94, 0.8) !important; /* 静态常亮发光效果 */
      }
    </style>
  </head>

<body>
    <div class="container">
        <div class="column">

            <img class="avatar avatar--rounded" src="images/avatar.png" srcset="images/avatar@2x.png 2x" alt="RockBrosClothing Logo">

            <h1>
              <div>ROCKBROS Clothing</div>
            </h1>

            <p class="bio">
              🚴 Celebrating the pure joy of cycling.<br>
              ⚡️ Performance meets ultimate comfort.<br>
              🤝 Crafted & tested by cyclists, for cyclists.
            </p>

            <div class="button-stack" role="navigation">

              <a class="button button-default" href="https://rockbrosclothing.com/s/d0077f" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/generic-website.svg" alt="Website Icon">Official Store
              </a>

              <a class="button button-default" href="https://rockbrosclothing.com/collections/spring-collection" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/generic-shopping-bag.svg" alt="Shopping Bag Icon">Spring Collection
              </a>

              <a class="button button-default" href="https://rockbrosclothing.com/collections/cycling-jersey/Men's" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/generic-shopping-bag.svg" alt="Men's Jersey Icon">Men's Jerseys
              </a>

              <a class="button button-default" href="https://rockbrosclothing.com/collections/cycling-jersey/Women's" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/generic-shopping-bag.svg" alt="Women's Jersey Icon">Women's Jerseys
              </a>

              <a class="button button-instagram" href="https://www.instagram.com/rockbros_clothing/" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/instagram.svg" alt="Instagram Logo">Instagram
              </a>

              <a class="button button-faceb" href="https://www.facebook.com/rockbrosclothing.cc" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/facebook.svg" alt="Facebook Logo">Facebook
              </a>

              <a class="button button-threads" href="https://www.threads.com/@rockbros_clothing" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/threads.svg" alt="Threads Logo">Threads
              </a>
              
              <a class="button button-default" href="mailto:service@rockbrosclothing.com" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/generic-email.svg" alt="Email Icon">Contact Us
              </a>

          </div>

          <footer>
            <a href="https://rockbrosclothing.com/policies/privacy-policy">Privacy Policy</a> | ROCKBROS Clothing © 2026
          </footer>

        </div>
    </div>
</body>
</html>
