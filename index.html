<!DOCTYPE html>
<html class="theme-auto" lang="en"> 
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>RockBrosClothing - Official Links</title>
    <link rel="icon" type="image/x-icon" href="images/avatar.png"> 

    <meta name="description" content="Discover premium cycling apparel with RockBrosClothing. Shop high-quality cycling jerseys, shorts, and bibs.">

    <meta name="keywords" content="RockBrosClothing, cycling apparel, cycling jersey, cycling shorts, riding gear">

    <link rel="canonical" href="https://rockbrosclothing.com">

    <meta name="author" content="RockBrosClothing">

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

    <style>
      .button.button-default {
        background-color: #17A05E !important; /* RockBros Green */
        color: white !important; /* Text color on green background */
        border: none !important; /* Ensure no border, if any */
      }
      /* 按钮悬停变深 */
      .button.button-default:hover {
        background-color: #138750 !important;
      }
      /* 调整简介段落的行高 */
      p.bio {
        line-height: 1.6;
        margin-bottom: 30px;
      }

      /* --- 更新：为头像添加 RockBros 绿色动态边框和发光效果 --- */
      .avatar {
        /* 基础设置：设置 4 像素宽的实线边框，颜色为官方绿 */
        border: 4px solid #17A05E !important;
        
        /* 核心：添加过渡效果，使所有样式变化在 0.3s 内平滑完成 */
        transition: all 0.3s ease-in-out !important;

        /* 在亮色模式下添加一个极柔和的初始光晕（可选，增强质感） */
        box-shadow: 0 0 10px rgba(23, 160, 94, 0.2); 
      }

      /* 当鼠标悬停（Hover）在头像上时触发的效果 */
      .avatar:hover {
        /* 动态放大：将头像大小增加 10% (1.1 倍) */
        transform: scale(1.1) rotate(0.1deg); /* 增加一点点旋转以使放大更平滑 */
        
        /* 动态发光：添加一个更强烈、更鲜艳的绿色发光阴影 */
        box-shadow: 0 0 20px rgba(23, 160, 94, 1);
        
        /* 动态加深边框：让边框颜色稍微变深一点，增加层次感 */
        border-color: #138750 !important;
      }
    </style>
  </head>

<body>
    <div class="container">
        <div class="column">

            <img class="avatar avatar--rounded" src="images/avatar.png" srcset="images/avatar@2x.png 2x" alt="RockBrosClothing Logo">

            <h1>
              <div>RockBrosClothing</div>
            </h1>

            <p class="bio">
              🚴 Celebrating the pure joy of cycling.<br>
              ⚡️ Performance meets ultimate comfort.<br>
              🤝 Crafted & tested by cyclists, for cyclists.
            </p>

            <div class="button-stack" role="navigation">

              <a class="button button-default" href="https://rockbrosclothing.com" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/generic-website.svg" alt="Website Icon">Official Website
              </a>

              <a class="button button-default" href="https://rockbrosclothing.com/collections/spring-collection" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/generic-shopping-bag.svg" alt="Shopping Bag Icon">Shop Spring Collection
              </a>

              <a class="button button-default" href="https://rockbrosclothing.com" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/generic-shopping-tag.svg" alt="Discount Icon">Single Jersey Only $80.99 (Code: RIDE39)
              </a>

              <a class="button button-instagram" href="https://www.instagram.com/rockbros_clothing/" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/instagram.svg" alt="Instagram Logo">Instagram
              </a>

              <a class="button button-threads" href="https://www.threads.com/@rockbros_clothing" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/threads.svg" alt="Threads Logo">Threads
              </a>

              <a class="button button-faceb" href="https://www.facebook.com/rockbrosclothing.cc" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/facebook.svg" alt="Facebook Logo">Facebook
              </a>

          </div>

          <footer>
            <a href="https://rockbrosclothing.com/policies/privacy-policy">Privacy Policy</a> | RockBrosClothing © 2026
          </footer>

        </div>
    </div>
</body>
</html>
